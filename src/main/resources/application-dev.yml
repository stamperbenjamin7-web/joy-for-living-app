# Perfil local: base de datos H2 en memoria, sin instalaciones adicionales.
spring:
  datasource:
    url: jdbc:h2:mem:joyforliving;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.joyforliving: DEBUG
