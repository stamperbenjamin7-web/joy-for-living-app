# ---------------------------------------------------------------------------
# Integracion continua: cada push y cada pull request compila el frontend y el
# backend, ejecuta las pruebas y publica el artefacto ejecutable.
# ---------------------------------------------------------------------------
name: Integracion continua

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  construir-y-probar:
    name: Construir y probar
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4

      - name: Preparar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Preparar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Instalar dependencias del frontend
        working-directory: frontend
        run: npm install

      - name: Construir el frontend
        working-directory: frontend
        run: npm run build

      - name: Compilar y ejecutar pruebas del backend
        run: mvn -B verify -DskipFrontend

      - name: Publicar el reporte de pruebas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-pruebas
          path: target/surefire-reports/
          if-no-files-found: ignore

      - name: Publicar el artefacto ejecutable
        uses: actions/upload-artifact@v4
        with:
          name: joy-for-living-api
          path: target/*.jar
